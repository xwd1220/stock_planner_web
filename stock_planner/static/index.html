<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票交易计划工具 V1</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: #fffaf2;
      --line: #d7c7aa;
      --text: #2f2419;
      --muted: #7b6a58;
      --accent: #a74a2a;
      --accent-2: #1f6f78;
      --ok: #215732;
      --warn: #9a5a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(167, 74, 42, 0.08), transparent 24rem),
        radial-gradient(circle at bottom right, rgba(31, 111, 120, 0.08), transparent 20rem),
        var(--bg);
      color: var(--text);
    }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
    }
    .lead {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(47, 36, 25, 0.06);
    }
    .panel-wide {
      grid-column: 1 / -1;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }
    .subgrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .symbol-panel .form-grid {
      grid-template-columns: minmax(180px, 1.1fr) minmax(220px, 1.4fr) minmax(140px, 0.8fr) minmax(120px, 0.7fr);
      align-items: end;
    }
    .symbol-footer {
      display: grid;
      grid-template-columns: minmax(260px, 1.2fr) minmax(220px, 0.8fr);
      gap: 14px;
      margin-top: 14px;
      align-items: start;
    }
    .symbol-note textarea {
      min-height: 84px;
    }
    .symbol-side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100%;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea, button {
      font: inherit;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--text);
    }
    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      min-height: 44px;
      line-height: 1.2;
      padding-right: 42px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--text) 50%),
        linear-gradient(135deg, var(--text) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% - 2px),
        calc(100% - 14px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }
    select::-ms-expand {
      display: none;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      opacity: .95;
    }
    .primary {
      background: var(--accent);
      color: #fff;
    }
    .secondary {
      background: var(--accent-2);
      color: #fff;
    }
    .ghost {
      background: #efe4d2;
      color: var(--text);
    }
    .meta {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .message {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }
    .message.show {
      display: block;
    }
    .message.ok {
      background: rgba(33, 87, 50, 0.08);
      color: var(--ok);
    }
    .message.warn {
      background: rgba(154, 90, 0, 0.10);
      color: var(--warn);
    }
    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #eadfcf;
      padding: 10px 12px;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child {
      text-align: left;
    }
    th {
      color: var(--muted);
      font-weight: 600;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .summary-item {
      border: 1px solid #eadfcf;
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.72);
    }
    .summary-item strong {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .summary-item span {
      font-size: 20px;
      font-weight: 700;
    }
    .history-list {
      display: grid;
      gap: 10px;
    }
    .history-card {
      border: 1px solid #eadfcf;
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.72);
    }
    .history-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .history-card small {
      display: block;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .history-card .ghost {
      padding: 8px 14px;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
    }
    .notice {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    code {
      background: rgba(47, 36, 25, 0.06);
      padding: 1px 5px;
      border-radius: 6px;
    }
    @media (max-width: 720px) {
      .page { padding: 20px 14px 36px; }
      h1 { font-size: 28px; }
      .panel { padding: 16px; }
    }
    @media (max-width: 980px) {
      .symbol-panel .form-grid,
      .symbol-footer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>股票交易计划工具 V1</h1>
    <p class="lead">当前版本支持标的配置、买入计划生成器、卖出计划生成器、计划保存和历史查看。频率请输入小数，例如 <code>0.05</code> 表示 5%。</p>

    <div class="grid">
      <section class="panel panel-wide symbol-panel">
        <h2>标的配置</h2>
        <div class="form-grid">
          <label>标的代码
            <input id="symbolCode" placeholder="NVDA">
          </label>
          <label>标的名称
            <input id="symbolName" placeholder="NVIDIA">
          </label>
          <label>标的类型
            <select id="assetType">
              <option value="stock">个股</option>
              <option value="etf">ETF</option>
            </select>
          </label>
          <label>币种
            <input id="currency" value="USD">
          </label>
        </div>
        <div class="symbol-footer">
          <label class="symbol-note">备注
            <textarea id="symbolNotes" placeholder="可填写投资逻辑、策略备注等"></textarea>
          </label>
          <div class="symbol-side">
            <div class="actions" style="margin-top:0;">
              <button class="primary" id="saveSymbolBtn">保存标的</button>
              <button class="ghost" id="refreshSymbolsBtn">刷新列表</button>
            </div>
            <div class="meta" id="symbolMeta">当前未保存标的。</div>
            <div class="message" id="symbolMessage"></div>
          </div>
        </div>
        <div class="notice">当前部署为纯前端静态版，数据保存在当前浏览器的本地存储中，不会自动同步到其他设备。</div>
      </section>

      <section class="panel panel-wide">
        <h2>买入计划生成器</h2>
        <div class="form-grid">
          <label>标的代码
            <input id="buySymbolCode" placeholder="NVDA">
          </label>
          <label>初始买入价格
            <input id="buyInitialPrice" type="number" step="0.01" value="100">
          </label>
          <label>计划资金
            <input id="buyPlannedCapital" type="number" step="0.01" value="500000">
          </label>
          <label>买入频率
            <input id="buyFrequency" type="number" step="0.0001" value="0.05">
          </label>
          <label>买入次数
            <input id="buyCount" type="number" step="1" value="6">
          </label>
          <label>首单数量
            <input id="buyBaseQuantity" type="number" step="1" value="200">
          </label>
          <label style="grid-column: 1 / -1;">买单倍数
            <input id="buyMultipliers" value="1,1,1.5,1.5,2,2">
          </label>
        </div>
        <div class="actions">
          <button class="primary" id="calcBuyBtn">计算买入计划</button>
          <button class="ghost" id="saveBuyBtn">保存买入计划</button>
        </div>
        <div class="message" id="buyMessage"></div>
        <div id="buySummary" class="summary"></div>
        <div class="table-wrap" id="buyTableWrap"></div>
      </section>

      <section class="panel panel-wide">
        <h2>卖出计划生成器</h2>
        <div class="form-grid">
          <label>标的代码
            <input id="sellSymbolCode" placeholder="NVDA">
          </label>
          <label>持仓成本
            <input id="sellAverageCost" type="number" step="0.01" value="72.52">
          </label>
          <label>总持仓数量
            <input id="sellTotalQuantity" type="number" step="1" value="5575">
          </label>
          <label>计划卖出数量
            <input id="sellIntendedQuantity" type="number" step="1" value="1673">
          </label>
          <label>目标回收资金
            <input id="sellTargetRecovery" type="number" step="0.01" value="404282.75">
          </label>
          <label>初始卖出价格
            <input id="sellInitialPrice" type="number" step="0.01" value="94.28">
          </label>
          <label>初始执行价格
            <input id="sellInitialExecutionPrice" type="number" step="0.01" value="157.19">
          </label>
          <label>卖出频率
            <input id="sellFrequency" type="number" step="0.0001" value="0.30">
          </label>
          <label>卖出次数
            <input id="sellCount" type="number" step="1" value="4">
          </label>
          <label style="grid-column: 1 / -1;">卖单倍数
            <input id="sellMultipliers" value="2,3,3,2">
          </label>
        </div>
        <div class="actions">
          <button class="secondary" id="calcSellBtn">计算卖出计划</button>
          <button class="ghost" id="saveSellBtn">保存卖出计划</button>
        </div>
        <div class="message" id="sellMessage"></div>
        <div id="sellSummary" class="summary"></div>
        <div class="table-wrap" id="sellTableWrap"></div>
      </section>

      <section class="panel panel-wide">
        <h2>历史记录</h2>
        <div class="actions" style="margin-top:0;">
          <button class="ghost" id="refreshHistoryBtn">刷新历史记录</button>
        </div>
        <div class="subgrid" style="margin-top:14px;">
          <div>
            <h3 style="margin:0 0 12px;">买入计划历史</h3>
            <div id="buyHistory" class="history-list"></div>
          </div>
          <div>
            <h3 style="margin:0 0 12px;">卖出计划历史</h3>
            <div id="sellHistory" class="history-list"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const byId = (id) => document.getElementById(id);
    const STORAGE_KEYS = {
      symbols: "stock_planner_symbols_v1",
      buyPlans: "stock_planner_buy_plans_v1",
      sellPlans: "stock_planner_sell_plans_v1"
    };

    const state = {
      symbols: [],
      buyPlans: [],
      sellPlans: [],
      currentSymbolId: null,
      lastBuyPlanPayload: null,
      lastBuyResult: null,
      lastSellPlanPayload: null,
      lastSellResult: null
    };

    function loadStore(key, fallback = []) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveStore(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function round2(value) {
      return (Math.round((Number(value) + Number.EPSILON) * 100) / 100).toFixed(2);
    }

    function intDown(value) {
      return Math.floor(Number(value));
    }

    function parseNumberList(raw) {
      return raw
        .split(",")
        .map(item => item.trim())
        .filter(Boolean)
        .map(Number);
    }

    function showMessage(targetId, text, type) {
      const el = byId(targetId);
      el.textContent = text || "";
      el.className = "message" + (text ? ` show ${type}` : "");
    }

    function renderSummary(targetId, items) {
      byId(targetId).innerHTML = items.map(item => `
        <div class="summary-item">
          <strong>${item.label}</strong>
          <span>${item.value}</span>
        </div>
      `).join("");
    }

    function renderTable(targetId, columns, rows) {
      if (!rows || !rows.length) {
        byId(targetId).innerHTML = `<div class="empty">暂无数据。</div>`;
        return;
      }
      const head = columns.map(col => `<th>${col.label}</th>`).join("");
      const body = rows.map(row => `
        <tr>
          ${columns.map(col => `<td>${row[col.key] ?? ""}</td>`).join("")}
        </tr>
      `).join("");
      byId(targetId).innerHTML = `
        <table>
          <thead><tr>${head}</tr></thead>
          <tbody>${body}</tbody>
        </table>
      `;
    }

    function loadState() {
      state.symbols = loadStore(STORAGE_KEYS.symbols, []);
      state.buyPlans = loadStore(STORAGE_KEYS.buyPlans, []);
      state.sellPlans = loadStore(STORAGE_KEYS.sellPlans, []);
    }

    function currentSymbolIdByCode(code) {
      const normalized = (code || "").trim().toUpperCase();
      const match = state.symbols.find(item => item.symbol_code === normalized);
      state.currentSymbolId = match ? match.id : null;
      return state.currentSymbolId;
    }

    function getSymbolByCode(code) {
      const normalized = (code || "").trim().toUpperCase();
      return state.symbols.find(item => item.symbol_code === normalized) || null;
    }

    function buildBuyPayload() {
      return {
        symbol_code: byId("buySymbolCode").value.trim().toUpperCase(),
        initial_price: Number(byId("buyInitialPrice").value),
        planned_capital: Number(byId("buyPlannedCapital").value),
        buy_frequency_pct: Number(byId("buyFrequency").value),
        buy_count: Number(byId("buyCount").value),
        base_quantity: Number(byId("buyBaseQuantity").value),
        multipliers: parseNumberList(byId("buyMultipliers").value)
      };
    }

    function buildSellPayload() {
      return {
        symbol_code: byId("sellSymbolCode").value.trim().toUpperCase(),
        average_cost: Number(byId("sellAverageCost").value),
        total_position_quantity: Number(byId("sellTotalQuantity").value),
        intended_sell_quantity: Number(byId("sellIntendedQuantity").value),
        target_capital_recovery: Number(byId("sellTargetRecovery").value),
        initial_sell_price: Number(byId("sellInitialPrice").value),
        initial_capital_plan_price: Number(byId("sellInitialExecutionPrice").value),
        sell_frequency_pct: Number(byId("sellFrequency").value),
        sell_count: Number(byId("sellCount").value),
        multipliers: parseNumberList(byId("sellMultipliers").value)
      };
    }

    function validateBuyPlan(plan) {
      if (!plan.symbol_code) {
        throw new Error("标的代码不能为空。");
      }
      if (plan.buy_count <= 0) {
        throw new Error("买入次数必须大于 0。");
      }
      if (plan.multipliers.length !== plan.buy_count) {
        throw new Error("买单倍数数量必须与买入次数一致。");
      }
      if (plan.initial_price <= 0) {
        throw new Error("初始买入价格必须大于 0。");
      }
      if (plan.planned_capital <= 0) {
        throw new Error("计划资金必须大于 0。");
      }
      if (!(plan.buy_frequency_pct > 0 && plan.buy_frequency_pct < 1)) {
        throw new Error("买入频率必须在 0 到 1 之间。");
      }
      if (plan.base_quantity <= 0) {
        throw new Error("首单数量必须大于 0。");
      }
      if (plan.multipliers.some(value => Number(value) <= 0)) {
        throw new Error("买单倍数必须大于 0。");
      }
    }

    function validateSellPlan(plan) {
      if (!plan.symbol_code) {
        throw new Error("标的代码不能为空。");
      }
      if (plan.sell_count <= 0) {
        throw new Error("卖出次数必须大于 0。");
      }
      if (plan.multipliers.length !== plan.sell_count) {
        throw new Error("卖单倍数数量必须与卖出次数一致。");
      }
      if (plan.average_cost <= 0) {
        throw new Error("持仓成本必须大于 0。");
      }
      if (plan.total_position_quantity <= 0) {
        throw new Error("总持仓数量必须大于 0。");
      }
      if (plan.intended_sell_quantity <= 0) {
        throw new Error("计划卖出数量必须大于 0。");
      }
      if (plan.intended_sell_quantity > plan.total_position_quantity) {
        throw new Error("计划卖出数量不能超过总持仓数量。");
      }
      if (plan.target_capital_recovery <= 0) {
        throw new Error("目标回收资金必须大于 0。");
      }
      if (plan.initial_sell_price <= 0) {
        throw new Error("初始卖出价格必须大于 0。");
      }
      if (plan.initial_capital_plan_price <= 0) {
        throw new Error("初始执行价格必须大于 0。");
      }
      if (!(plan.sell_frequency_pct > 0 && plan.sell_frequency_pct < 1)) {
        throw new Error("卖出频率必须在 0 到 1 之间。");
      }
      if (plan.multipliers.some(value => Number(value) <= 0)) {
        throw new Error("卖单倍数必须大于 0。");
      }
    }

    function calculateBuyPlan(plan) {
      validateBuyPlan(plan);

      const nodes = [];
      let currentPrice = Number(round2(plan.initial_price));
      let currentQuantity = intDown(plan.base_quantity);
      let cumulativeCapital = 0;
      let cumulativeQuantity = 0;

      for (let index = 0; index < plan.buy_count; index += 1) {
        const multiplier = Number(plan.multipliers[index]);
        if (index > 0) {
          currentPrice = Number(round2(currentPrice * (1 - plan.buy_frequency_pct)));
          currentQuantity = intDown(Number(nodes[index - 1].quantity) * multiplier);
        }
        const capitalUsed = Number(round2(currentPrice * currentQuantity));
        cumulativeCapital = Number(round2(cumulativeCapital + capitalUsed));
        cumulativeQuantity += currentQuantity;
        const averageCost = Number(round2(cumulativeCapital / cumulativeQuantity));

        nodes.push({
          node_index: index + 1,
          price: round2(currentPrice),
          quantity: String(currentQuantity),
          multiplier: String(multiplier),
          capital_used: round2(capitalUsed),
          cumulative_capital: round2(cumulativeCapital),
          cumulative_quantity: String(cumulativeQuantity),
          average_cost: round2(averageCost)
        });
      }

      const budgetGap = Number(round2(plan.planned_capital - cumulativeCapital));
      const overBudget = cumulativeCapital > plan.planned_capital;
      const warnings = overBudget ? [`买入计划超出预算 ${round2(cumulativeCapital - plan.planned_capital)} 美元。`] : [];

      return {
        symbol_code: plan.symbol_code,
        nodes,
        total_capital: round2(cumulativeCapital),
        total_quantity: String(cumulativeQuantity),
        average_cost: nodes[nodes.length - 1].average_cost,
        planned_capital: round2(plan.planned_capital),
        over_budget: overBudget,
        budget_gap: round2(budgetGap),
        warnings
      };
    }

    function calculateSellPlan(plan) {
      validateSellPlan(plan);

      const nodes = [];
      const totalMultiplier = plan.multipliers.reduce((sum, value) => sum + Number(value), 0);
      let currentSellPrice = Number(round2(plan.initial_sell_price));
      let currentExecutionPrice = Number(round2(plan.initial_capital_plan_price));
      let allocatedQuantity = 0;
      let cumulativeRecoveredCapital = 0;
      let cumulativePlannedCapital = 0;
      let soldQuantity = 0;

      for (let index = 0; index < plan.sell_count; index += 1) {
        const multiplier = Number(plan.multipliers[index]);
        if (index > 0) {
          currentSellPrice = Number(round2(currentSellPrice * (1 + plan.sell_frequency_pct)));
          currentExecutionPrice = Number(round2(currentExecutionPrice * (1 + plan.sell_frequency_pct)));
        }

        let nodeQuantity;
        if (index === plan.sell_count - 1) {
          nodeQuantity = intDown(plan.intended_sell_quantity - allocatedQuantity);
        } else {
          const rawQuantity = plan.intended_sell_quantity * (multiplier / totalMultiplier);
          nodeQuantity = intDown(rawQuantity);
          allocatedQuantity += nodeQuantity;
        }

        soldQuantity += nodeQuantity;
        const recoveredCapital = Number(round2(currentSellPrice * nodeQuantity));
        const plannedCapital = Number(round2(currentExecutionPrice * nodeQuantity));
        cumulativeRecoveredCapital = Number(round2(cumulativeRecoveredCapital + recoveredCapital));
        cumulativePlannedCapital = Number(round2(cumulativePlannedCapital + plannedCapital));
        const remainingQuantity = plan.total_position_quantity - soldQuantity;

        nodes.push({
          node_index: index + 1,
          sell_price: round2(currentSellPrice),
          capital_plan_price: round2(currentExecutionPrice),
          quantity: String(nodeQuantity),
          multiplier: String(multiplier),
          recovered_capital: round2(recoveredCapital),
          planned_capital: round2(plannedCapital),
          cumulative_recovered_capital: round2(cumulativeRecoveredCapital),
          cumulative_planned_capital: round2(cumulativePlannedCapital),
          remaining_quantity: String(remainingQuantity)
        });
      }

      const recoveryGap = Number(round2(plan.target_capital_recovery - cumulativeRecoveredCapital));
      const warnings = [];
      if (recoveryGap > 0) {
        warnings.push(`预计回收资金比目标少 ${round2(recoveryGap)} 美元。`);
      } else if (recoveryGap < 0) {
        warnings.push(`预计回收资金比目标多 ${round2(Math.abs(recoveryGap))} 美元。`);
      }

      return {
        symbol_code: plan.symbol_code,
        nodes,
        total_position_quantity: String(plan.total_position_quantity),
        intended_sell_quantity: String(plan.intended_sell_quantity),
        total_recovered_capital: round2(cumulativeRecoveredCapital),
        total_planned_capital: round2(cumulativePlannedCapital),
        remaining_quantity: nodes[nodes.length - 1].remaining_quantity,
        average_cost: round2(plan.average_cost),
        target_capital_recovery: round2(plan.target_capital_recovery),
        recovery_gap: round2(recoveryGap),
        warnings
      };
    }

    function applyBuyResult(result, message = "买入计划计算完成。") {
      const warnings = result.warnings || [];
      showMessage("buyMessage", warnings.join(" ") || message, warnings.length ? "warn" : "ok");
      renderSummary("buySummary", [
        { label: "累计投入资金", value: result.total_capital },
        { label: "累计买入数量", value: result.total_quantity },
        { label: "持仓成本", value: result.average_cost },
        { label: "预算差额", value: result.budget_gap }
      ]);
      renderTable("buyTableWrap", [
        { key: "node_index", label: "节点" },
        { key: "price", label: "买入价格" },
        { key: "quantity", label: "买入数量" },
        { key: "multiplier", label: "倍数" },
        { key: "capital_used", label: "消耗资金" },
        { key: "cumulative_capital", label: "累计资金" },
        { key: "cumulative_quantity", label: "累计数量" },
        { key: "average_cost", label: "持仓成本" }
      ], result.nodes || []);
      byId("sellSymbolCode").value = result.symbol_code || byId("buySymbolCode").value.trim();
      byId("sellAverageCost").value = result.average_cost;
      byId("sellTotalQuantity").value = result.total_quantity;
      state.lastBuyResult = result;
    }

    function applySellResult(result, message = "卖出计划计算完成。") {
      const warnings = result.warnings || [];
      showMessage("sellMessage", warnings.join(" ") || message, warnings.length ? "warn" : "ok");
      renderSummary("sellSummary", [
        { label: "总回收资金", value: result.total_recovered_capital },
        { label: "总计划资金", value: result.total_planned_capital },
        { label: "剩余持仓", value: result.remaining_quantity },
        { label: "目标差额", value: result.recovery_gap }
      ]);
      renderTable("sellTableWrap", [
        { key: "node_index", label: "节点" },
        { key: "sell_price", label: "卖出价格" },
        { key: "capital_plan_price", label: "执行价格" },
        { key: "quantity", label: "卖出数量" },
        { key: "multiplier", label: "倍数" },
        { key: "recovered_capital", label: "回收资金" },
        { key: "planned_capital", label: "计划资金" },
        { key: "cumulative_recovered_capital", label: "累计回收资金" },
        { key: "remaining_quantity", label: "剩余持仓" }
      ], result.nodes || []);
      state.lastSellResult = result;
    }

    function fillBuyFormFromSavedPlan(savedPlan) {
      const config = savedPlan.config;
      byId("buySymbolCode").value = config.symbol_code;
      byId("buyInitialPrice").value = config.initial_price;
      byId("buyPlannedCapital").value = config.planned_capital;
      byId("buyFrequency").value = config.buy_frequency_pct;
      byId("buyCount").value = config.buy_count;
      byId("buyBaseQuantity").value = config.base_quantity;
      byId("buyMultipliers").value = config.multipliers.join(",");
      state.lastBuyPlanPayload = buildBuyPayload();
      applyBuyResult(savedPlan.result, `已加载买入历史计划 #${savedPlan.config_id}。`);
    }

    function fillSellFormFromSavedPlan(savedPlan) {
      const config = savedPlan.config;
      byId("sellSymbolCode").value = config.symbol_code;
      byId("sellAverageCost").value = config.average_cost;
      byId("sellTotalQuantity").value = config.total_position_quantity;
      byId("sellIntendedQuantity").value = config.intended_sell_quantity;
      byId("sellTargetRecovery").value = config.target_capital_recovery;
      byId("sellInitialPrice").value = config.initial_sell_price;
      byId("sellInitialExecutionPrice").value = config.initial_capital_plan_price;
      byId("sellFrequency").value = config.sell_frequency_pct;
      byId("sellCount").value = config.sell_count;
      byId("sellMultipliers").value = config.multipliers.join(",");
      state.lastSellPlanPayload = buildSellPayload();
      applySellResult(savedPlan.result, `已加载卖出历史计划 #${savedPlan.config_id}。`);
    }

    function saveSymbol() {
      showMessage("symbolMessage", "", "ok");
      const symbol = {
        id: Date.now(),
        symbol_code: byId("symbolCode").value.trim().toUpperCase(),
        symbol_name: byId("symbolName").value.trim(),
        asset_type: byId("assetType").value,
        currency: byId("currency").value.trim() || "USD",
        notes: byId("symbolNotes").value.trim(),
        updated_at: new Date().toLocaleString("zh-CN")
      };
      if (!symbol.symbol_code) {
        showMessage("symbolMessage", "标的代码不能为空。", "warn");
        return;
      }

      const exists = getSymbolByCode(symbol.symbol_code);
      if (exists) {
        symbol.id = exists.id;
        state.symbols = state.symbols.map(item => item.symbol_code === symbol.symbol_code ? symbol : item);
      } else {
        state.symbols.unshift(symbol);
      }

      saveStore(STORAGE_KEYS.symbols, state.symbols);
      byId("buySymbolCode").value = symbol.symbol_code;
      byId("sellSymbolCode").value = symbol.symbol_code;
      currentSymbolIdByCode(symbol.symbol_code);
      loadSymbols();
      showMessage("symbolMessage", `标的 ${symbol.symbol_code} 已保存。`, "ok");
    }

    function loadSymbols() {
      loadState();
      if (!state.symbols.length) {
        byId("symbolMeta").textContent = "当前未保存标的。";
        return;
      }
      byId("symbolMeta").textContent = `已保存 ${state.symbols.length} 个标的：` + state.symbols.map(item => `${item.symbol_code}${item.symbol_name ? `(${item.symbol_name})` : ""}`).join("、");
      currentSymbolIdByCode(byId("buySymbolCode").value || byId("sellSymbolCode").value);
    }

    function calculateBuyPlanAction() {
      showMessage("buyMessage", "", "ok");
      try {
        const payload = buildBuyPayload();
        const result = calculateBuyPlan(payload);
        state.lastBuyPlanPayload = payload;
        applyBuyResult(result);
        currentSymbolIdByCode(payload.symbol_code);
      } catch (error) {
        showMessage("buyMessage", error.message || "计算失败", "warn");
      }
    }

    function calculateSellPlanAction() {
      showMessage("sellMessage", "", "ok");
      try {
        const payload = buildSellPayload();
        const result = calculateSellPlan(payload);
        state.lastSellPlanPayload = payload;
        applySellResult(result);
        currentSymbolIdByCode(payload.symbol_code);
      } catch (error) {
        showMessage("sellMessage", error.message || "计算失败", "warn");
      }
    }

    function saveBuyPlan() {
      if (!state.lastBuyPlanPayload || !state.lastBuyResult) {
        showMessage("buyMessage", "请先计算买入计划，再执行保存。", "warn");
        return;
      }
      const symbol = getSymbolByCode(state.lastBuyPlanPayload.symbol_code);
      if (!symbol) {
        showMessage("buyMessage", "请先保存对应标的，再保存买入计划。", "warn");
        return;
      }

      const record = {
        config_id: Date.now(),
        symbol_id: symbol.id,
        symbol_code: symbol.symbol_code,
        symbol_name: symbol.symbol_name,
        created_at: new Date().toLocaleString("zh-CN"),
        config: { ...state.lastBuyPlanPayload },
        result: JSON.parse(JSON.stringify(state.lastBuyResult))
      };
      state.buyPlans.unshift(record);
      saveStore(STORAGE_KEYS.buyPlans, state.buyPlans);
      showMessage("buyMessage", `买入计划已保存，编号 #${record.config_id}。`, "ok");
      loadHistory();
    }

    function saveSellPlan() {
      if (!state.lastSellPlanPayload || !state.lastSellResult) {
        showMessage("sellMessage", "请先计算卖出计划，再执行保存。", "warn");
        return;
      }
      const symbol = getSymbolByCode(state.lastSellPlanPayload.symbol_code);
      if (!symbol) {
        showMessage("sellMessage", "请先保存对应标的，再保存卖出计划。", "warn");
        return;
      }

      const record = {
        config_id: Date.now(),
        symbol_id: symbol.id,
        symbol_code: symbol.symbol_code,
        symbol_name: symbol.symbol_name,
        created_at: new Date().toLocaleString("zh-CN"),
        config: { ...state.lastSellPlanPayload },
        result: JSON.parse(JSON.stringify(state.lastSellResult))
      };
      state.sellPlans.unshift(record);
      saveStore(STORAGE_KEYS.sellPlans, state.sellPlans);
      showMessage("sellMessage", `卖出计划已保存，编号 #${record.config_id}。`, "ok");
      loadHistory();
    }

    function renderHistory(targetId, items, onLoad, formatter) {
      if (!items.length) {
        byId(targetId).innerHTML = `<div class="empty">暂无历史记录。</div>`;
        return;
      }
      byId(targetId).innerHTML = items.map(item => `
        <div class="history-card">
          <strong>${formatter.title(item)}</strong>
          <small>${formatter.meta(item)}</small>
          <button class="ghost" data-id="${item.config_id}">加载计划</button>
        </div>
      `).join("");
      byId(targetId).querySelectorAll("button[data-id]").forEach(button => {
        button.addEventListener("click", () => onLoad(Number(button.dataset.id)));
      });
    }

    function loadHistory() {
      loadState();
      renderHistory("buyHistory", state.buyPlans, loadBuyHistoryDetail, {
        title: (item) => `${item.symbol_code}${item.symbol_name ? ` (${item.symbol_name})` : ""} · 买入计划 #${item.config_id}`,
        meta: (item) => `创建时间 ${item.created_at}，首价 ${item.config.initial_price}，次数 ${item.config.buy_count}`
      });
      renderHistory("sellHistory", state.sellPlans, loadSellHistoryDetail, {
        title: (item) => `${item.symbol_code}${item.symbol_name ? ` (${item.symbol_name})` : ""} · 卖出计划 #${item.config_id}`,
        meta: (item) => `创建时间 ${item.created_at}，目标回收 ${item.config.target_capital_recovery}，次数 ${item.config.sell_count}`
      });
    }

    function loadBuyHistoryDetail(configId) {
      const record = state.buyPlans.find(item => Number(item.config_id) === configId);
      if (!record) {
        showMessage("buyMessage", "未找到对应的买入历史计划。", "warn");
        return;
      }
      currentSymbolIdByCode(record.symbol_code);
      fillBuyFormFromSavedPlan(record);
    }

    function loadSellHistoryDetail(configId) {
      const record = state.sellPlans.find(item => Number(item.config_id) === configId);
      if (!record) {
        showMessage("sellMessage", "未找到对应的卖出历史计划。", "warn");
        return;
      }
      currentSymbolIdByCode(record.symbol_code);
      fillSellFormFromSavedPlan(record);
    }

    byId("saveSymbolBtn").addEventListener("click", saveSymbol);
    byId("refreshSymbolsBtn").addEventListener("click", loadSymbols);
    byId("calcBuyBtn").addEventListener("click", calculateBuyPlanAction);
    byId("saveBuyBtn").addEventListener("click", saveBuyPlan);
    byId("calcSellBtn").addEventListener("click", calculateSellPlanAction);
    byId("saveSellBtn").addEventListener("click", saveSellPlan);
    byId("refreshHistoryBtn").addEventListener("click", loadHistory);

    loadState();
    loadSymbols();
    loadHistory();
  </script>
</body>
</html>
